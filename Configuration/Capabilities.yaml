# This extension practices what we preach: a Capabilities.yaml manifest.
capabilities:
  version: "1.0"
  subsystems:
    - database:read
    - database:write
    - database:schema
    - site:middleware
    - content:plugin
    - backend:module
    - typoscript:provider
    - tca:override
  database:
    own_tables:
      - tx_x402_payment_log
    reads:
      - pages
      - tt_content
    writes:
      - tx_x402_payment_log
  network:
    outbound:
      - host: "x402.org"
        purpose: "x402 facilitator — payment verification and settlement"
        protocol: "https"
  events:
    dispatches:
      - Webconsulting\X402Paywall\Event\PaymentRequiredEvent
      - Webconsulting\X402Paywall\Event\PaymentReceivedEvent
  risk:
    level: "medium"
    justification: "Middleware, frontend plugin, outbound network to facilitator, writes payment log"
